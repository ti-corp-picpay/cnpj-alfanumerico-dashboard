<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=./dashboard.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando para Dashboard CNPJ Alfanumérico...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e5128 0%, #2d6a4f 100%);
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #21C25E;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>Carregando Dashboard CNPJ Alfanumérico...</h2>
        <p>Se não redirecionar automaticamente, <a href="./dashboard.html">clique aqui</a></p>
    </div>
    <script>
        // Fallback redirect
        setTimeout(function() {
            window.location.href = './dashboard.html';
        }, 100);
    </script>
</body>
</html>
