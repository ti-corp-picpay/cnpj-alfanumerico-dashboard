name: Update Dashboard

on:
  schedule:
    # 8h Brasília (11h UTC) - segunda a sexta
    - cron: '0 11 * * 1-5'
    # 14h Brasília (17h UTC) - segunda a sexta
    - cron: '0 17 * * 1-5'
  workflow_dispatch: # Permite rodar manualmente

# Permissões necessárias para GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Instalar dependências
      run: |
        pip install -r requirements.txt
    
    - name: Gerar dashboard
      env:
        JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        PYTHONIOENCODING: utf-8
        LC_ALL: C.UTF-8
        LANG: C.UTF-8
      run: |
        python generate_dashboard.py
    
    - name: Commit e push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add dashboard.html dashboard-data.json index.html
        git commit -m "chore: atualizar dashboard $(date +'%Y-%m-%d %H:%M')" || echo "Sem mudanças"
        git push || echo "Nada para push"
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        enable_jekyll: false
        keep_files: false
        force_orphan: true
        user_name: 'GitHub Actions Bot'
        user_email: 'actions@github.com'
        commit_message: 'Deploy dashboard atualizado'
